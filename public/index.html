<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo API - Web Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #11998e;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #11998e;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #11998e;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #11998e;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-buttons button {
            flex: 1;
            margin-top: 0;
            padding: 10px;
            font-size: 14px;
        }

        .filter-buttons button.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .todo-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #11998e;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .todo-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .todo-item.completed {
            border-left-color: #4caf50;
            opacity: 0.8;
        }

        .todo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .todo-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }

        .todo-item.completed .todo-title {
            text-decoration: line-through;
            color: #999;
        }

        .todo-description {
            color: #666;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .todo-meta {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 10px;
        }

        .todo-actions {
            display: flex;
            gap: 10px;
        }

        .todo-actions button {
            flex: 1;
            margin-top: 0;
            padding: 8px;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-badge.completed {
            background: #4caf50;
            color: white;
        }

        .status-badge.pending {
            background: #ff9800;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Todo API Manager</h1>
            <p class="subtitle">Manage your tasks with ease</p>
        </header>

        <div class="main-content">
            <!-- Left Panel - Create Todo -->
            <div class="card">
                <h2>➕ Create New Todo</h2>
                <form id="createForm">
                    <div class="form-group">
                        <label for="title">Title *</label>
                        <input type="text" id="title" placeholder="Enter todo title" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" placeholder="Enter description (optional)"></textarea>
                    </div>
                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="completed">
                            <label for="completed">Mark as completed</label>
                        </div>
                    </div>
                    <button type="submit">Create Todo</button>
                </form>

                <h2 style="margin-top: 30px;">🗑️ Bulk Actions</h2>
                <button class="btn-danger" onclick="deleteAllTodos()">Delete All Todos</button>
            </div>

            <!-- Right Panel - Todo List -->
            <div class="card">
                <h2>📋 Your Todos</h2>
                
                <div class="stats" id="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCount">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="completedCount">0</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="pendingCount">0</div>
                        <div class="stat-label">Pending</div>
                    </div>
                </div>

                <div class="filter-buttons">
                    <button class="active" onclick="filterTodos('all')">All</button>
                    <button onclick="filterTodos('pending')">Pending</button>
                    <button onclick="filterTodos('completed')">Completed</button>
                </div>

                <div class="todo-list" id="todoList">
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                        <p>No todos yet. Create your first todo!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api/todos';
        let currentFilter = 'all';

        // Load todos on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadTodos();
        });

        // Create todo form submission
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const completed = document.getElementById('completed').checked;

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ title, description, completed })
                });

                if (response.ok) {
                    document.getElementById('createForm').reset();
                    loadTodos();
                    showNotification('Todo created successfully!', 'success');
                } else {
                    const error = await response.json();
                    showNotification(error.error || 'Failed to create todo', 'error');
                }
            } catch (error) {
                showNotification('Network error. Please try again.', 'error');
            }
        });

        // Load todos
        async function loadTodos() {
            try {
                let url = API_BASE;
                if (currentFilter === 'completed') {
                    url += '?completed=true';
                } else if (currentFilter === 'pending') {
                    url += '?completed=false';
                }

                const response = await fetch(url);
                const todos = await response.json();
                
                displayTodos(todos);
                updateStats(todos);
            } catch (error) {
                showNotification('Failed to load todos', 'error');
            }
        }

        // Display todos
        function displayTodos(todos) {
            const todoList = document.getElementById('todoList');
            
            if (todos.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                        <p>No todos found</p>
                    </div>
                `;
                return;
            }

            todoList.innerHTML = todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <div class="todo-header">
                        <div class="todo-title">${escapeHtml(todo.title)}</div>
                        <span class="status-badge ${todo.completed ? 'completed' : 'pending'}">
                            ${todo.completed ? '✓ Completed' : '⏳ Pending'}
                        </span>
                    </div>
                    ${todo.description ? `<div class="todo-description">${escapeHtml(todo.description)}</div>` : ''}
                    <div class="todo-meta">
                        ID: ${todo.id} | Created: ${new Date(todo.createdAt).toLocaleString()}
                    </div>
                    <div class="todo-actions">
                        <button onclick="toggleComplete(${todo.id}, ${!todo.completed})">
                            ${todo.completed ? '↩️ Mark Incomplete' : '✓ Mark Complete'}
                        </button>
                        <button class="btn-secondary" onclick="editTodo(${todo.id})">✏️ Edit</button>
                        <button class="btn-danger" onclick="deleteTodo(${todo.id})">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Update statistics
        async function updateStats(filteredTodos) {
            try {
                const response = await fetch(API_BASE);
                const allTodos = await response.json();
                
                const total = allTodos.length;
                const completed = allTodos.filter(t => t.completed).length;
                const pending = total - completed;

                document.getElementById('totalCount').textContent = total;
                document.getElementById('completedCount').textContent = completed;
                document.getElementById('pendingCount').textContent = pending;
            } catch (error) {
                console.error('Failed to update stats');
            }
        }

        // Filter todos
        function filterTodos(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-buttons button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadTodos();
        }

        // Toggle complete status
        async function toggleComplete(id, completed) {
            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ completed })
                });

                if (response.ok) {
                    loadTodos();
                    showNotification('Todo updated!', 'success');
                }
            } catch (error) {
                showNotification('Failed to update todo', 'error');
            }
        }

        // Edit todo
        async function editTodo(id) {
            const newTitle = prompt('Enter new title:');
            if (!newTitle) return;

            const newDescription = prompt('Enter new description (optional):');

            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        title: newTitle,
                        description: newDescription || undefined
                    })
                });

                if (response.ok) {
                    loadTodos();
                    showNotification('Todo updated!', 'success');
                }
            } catch (error) {
                showNotification('Failed to update todo', 'error');
            }
        }

        // Delete todo
        async function deleteTodo(id) {
            if (!confirm('Are you sure you want to delete this todo?')) return;

            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadTodos();
                    showNotification('Todo deleted!', 'success');
                }
            } catch (error) {
                showNotification('Failed to delete todo', 'error');
            }
        }

        // Delete all todos
        async function deleteAllTodos() {
            if (!confirm('Are you sure you want to delete ALL todos? This cannot be undone!')) return;

            try {
                const response = await fetch(API_BASE, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadTodos();
                    showNotification('All todos deleted!', 'success');
                }
            } catch (error) {
                showNotification('Failed to delete todos', 'error');
            }
        }

        // Show notification
        function showNotification(message, type) {
            alert(message);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
